# ─────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker — Auth-Enabled Configuration
# ─────────────────────────────────────────────────────────────
# Password file is generated at container startup by entrypoint.sh
# using MQTT_USER / MQTT_PASSWORD environment variables.
# ─────────────────────────────────────────────────────────────

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/password_file

# ── Logging ──────────────────────────────────────────────────
log_type all
log_dest stdout
connection_messages true
